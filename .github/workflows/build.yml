name: Build (Windows MSVC)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [develop]
  pull_request:
  workflow_call:
    inputs:
      build-type:
        description: Type of build (Debug or Release)
        type: string
        default: Debug
      environment:
        description: Deployment environment to run under
        type: string
  workflow_dispatch:
    inputs:
      build-type:
        description: Type of build (Debug or Release)
        type: string
        default: Debug

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.artifact-name }})

    environment: ${{ inputs.environment || '' }}

    permissions:
      contents: read
      id-token: write      # Required for Azure Trusted Signing
      packages: write       # Required for vcpkg binary cache

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact-name: Windows-MSVC
            cmake-preset: windows_msvc
            vcvars-arch: amd64
            qt-version: 6.10.2

          - os: windows-11-arm
            artifact-name: Windows-MSVC-arm64
            cmake-preset: windows_msvc
            vcvars-arch: arm64
            qt-version: 6.10.2

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      ARTIFACT_NAME: ${{ matrix.artifact-name }}-Qt6
      BUILD_PLATFORM: official
      BUILD_TYPE: ${{ inputs.build-type || 'Debug' }}
      CMAKE_PRESET: ${{ matrix.cmake-preset }}

    steps:
      ##
      # SETUP
      ##

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # Enter MSVC Developer Command Prompt (sets cl.exe, link.exe, etc. on PATH)
      - name: Enter VS Developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.vcvars-arch }}
          vsversion: 2022

      # Java is required for building the Java components
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      # Configure vcpkg binary caching via GitHub Packages NuGet feed
      - name: Setup vcpkg cache
        if: ${{ env.BUILD_TYPE == 'Debug' }}
        shell: pwsh
        env:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ github.token }}
          FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        run: |
          .$(vcpkg fetch nuget) `
            sources add `
            -Source "$env:FEED_URL" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "$env:USERNAME" `
            -Password "$env:GITHUB_TOKEN"
          .$(vcpkg fetch nuget) `
            setapikey "$env:GITHUB_TOKEN" `
            -Source "$env:FEED_URL"
          "VCPKG_BINARY_SOURCES=clear;nuget,$env:FEED_URL,readwrite" | Out-File -Append $env:GITHUB_ENV

      # Point CMake at the vcpkg toolchain file
      - name: Setup vcpkg environment
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      # Install Qt 6 via aqtinstall (vcpkg doesn't provide Qt)
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: "==3.1.*"
          version: ${{ matrix.qt-version }}
          modules: qtimageformats qtnetworkauth
          cache: ${{ env.BUILD_TYPE == 'Debug' }}

      # Setup sccache for faster rebuilds on Debug builds
      - name: Setup sccache
        if: ${{ env.BUILD_TYPE == 'Debug' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.artifact-name }}-sccache

      - name: Use sccache on debug builds
        if: ${{ env.BUILD_TYPE == 'Debug' }}
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"

      ##
      # BUILD
      ##

      # Configure: uses the windows_msvc preset which sets Ninja Multi-Config
      # generator and points at the vcpkg toolchain file
      - name: Configure project
        run: |
          cmake --preset "$CMAKE_PRESET"

      # Build the project
      - name: Run build
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      # Run the test suite
      - name: Run tests
        run: |
          ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE"

      ##
      # PACKAGE
      ##

      - name: Get short version
        id: short-version
        run: |
          echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        uses: ./.github/actions/package/windows
        env:
          CI_HAS_ACCESS_TO_AZURE: ${{ vars.CI_HAS_ACCESS_TO_AZURE || '' }}
        with:
          version: ${{ steps.short-version.outputs.version }}
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: ${{ matrix.artifact-name }}
          msystem: ""
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
